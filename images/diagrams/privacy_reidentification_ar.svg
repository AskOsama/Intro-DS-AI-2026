<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" direction="rtl">
  <defs>
    <linearGradient id="warnGradAr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b15c26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b15c26;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="#f8f9fa" rx="10"/>

  <!-- Warning border -->
  <rect x="10" y="10" width="580" height="580" rx="15" fill="none" stroke="#b15c26" stroke-width="4" stroke-dasharray="15,5"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#b15c26">كيف تكشف البيانات "المجهولة" الهوية</text>

  <!-- Center masked figure -->
  <circle cx="300" cy="270" r="70" fill="#d6cdb8" stroke="#bdc3c8" stroke-width="3"/>
  <text x="300" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="50">🎭</text>
  <text x="300" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">"شخص</text>
  <text x="300" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7f8c8d">مجهول"</text>

  <!-- Data points around -->
  <!-- Top: ZIP Code -->
  <circle cx="300" cy="100" r="45" fill="#e3f2fd" stroke="#2c5a82" stroke-width="2"/>
  <text x="300" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">📍</text>
  <text x="300" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14202e">الرمز البريدي</text>
  <line x1="300" y1="145" x2="300" y2="200" stroke="#2c5a82" stroke-width="2"/>

  <!-- Top-Right: Birthday -->
  <circle cx="450" cy="170" r="45" fill="#fef3e2" stroke="#a07c1d" stroke-width="2"/>
  <text x="450" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🎂</text>
  <text x="450" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14202e">تاريخ الميلاد</text>
  <line x1="410" y1="200" x2="360" y2="240" stroke="#a07c1d" stroke-width="2"/>

  <!-- Right: Gender -->
  <circle cx="480" cy="300" r="45" fill="#e8daef" stroke="#6a3d75" stroke-width="2"/>
  <text x="480" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">👤</text>
  <text x="480" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14202e">الجنس</text>
  <line x1="435" y1="300" x2="370" y2="280" stroke="#6a3d75" stroke-width="2"/>

  <!-- Bottom-Right: Purchase History -->
  <circle cx="430" cy="430" r="45" fill="#d4edda" stroke="#2c6a5b" stroke-width="2"/>
  <text x="430" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🛒</text>
  <text x="430" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14202e">المشتريات</text>
  <line x1="395" y1="400" x2="340" y2="330" stroke="#2c6a5b" stroke-width="2"/>

  <!-- Bottom: Search History -->
  <circle cx="300" cy="470" r="45" fill="#fadbd8" stroke="#b15c26" stroke-width="2"/>
  <text x="300" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🔍</text>
  <text x="300" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14202e">عمليات البحث</text>
  <line x1="300" y1="425" x2="300" y2="340" stroke="#b15c26" stroke-width="2"/>

  <!-- Bottom-Left: Movie Ratings -->
  <circle cx="170" cy="430" r="45" fill="#fce4ec" stroke="#6a3d75" stroke-width="2"/>
  <text x="170" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🎬</text>
  <text x="170" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14202e">التقييمات</text>
  <line x1="205" y1="400" x2="260" y2="330" stroke="#6a3d75" stroke-width="2"/>

  <!-- Left: Location -->
  <circle cx="120" cy="300" r="45" fill="#e0f7fa" stroke="#00bcd4" stroke-width="2"/>
  <text x="120" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">📱</text>
  <text x="120" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14202e">بيانات GPS</text>
  <line x1="165" y1="300" x2="230" y2="280" stroke="#00bcd4" stroke-width="2"/>

  <!-- Top-Left: Job -->
  <circle cx="150" cy="170" r="45" fill="#fff8e1" stroke="#a07c1d" stroke-width="2"/>
  <text x="150" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">💼</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14202e">المهنة</text>
  <line x1="190" y1="200" x2="240" y2="240" stroke="#a07c1d" stroke-width="2"/>

  <!-- Plus signs -->
  <text x="370" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7f8c8d">+</text>
  <text x="470" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7f8c8d">+</text>
  <text x="470" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7f8c8d">+</text>
  <text x="370" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7f8c8d">+</text>
  <text x="230" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7f8c8d">+</text>
  <text x="130" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7f8c8d">+</text>
  <text x="130" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7f8c8d">+</text>
  <text x="230" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7f8c8d">+</text>

  <!-- Result -->
  <rect x="180" y="530" width="240" height="50" rx="10" fill="url(#warnGradAr)"/>
  <text x="300" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">= فرد محدد الهوية</text>

  <!-- Statistic -->
  <rect x="420" y="530" width="160" height="50" rx="8" fill="#fff3cd" stroke="#a07c1d" stroke-width="2"/>
  <text x="500" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#856404">
    <tspan font-weight="bold">87%</tspan> من الأمريكيين
  </text>
  <text x="500" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#856404">يمكن تحديدهم بـ ZIP+DOB+الجنس</text>
</svg>