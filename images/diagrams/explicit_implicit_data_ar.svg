<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" direction="rtl">
  <defs>
    <linearGradient id="blueGrad2Ar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5a82;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5a82;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad2Ar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a07c1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#14202e">البيانات الصريحة مقابل البيانات الضمنية</text>

  <!-- Right Box: Explicit Data (RTL) -->
  <rect x="470" y="55" width="200" height="280" rx="15" fill="#e3f2fd" stroke="#2c5a82" stroke-width="2"/>
  <rect x="470" y="55" width="200" height="40" rx="15" fill="url(#blueGrad2Ar)"/>
  <text x="570" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">بيانات صريحة</text>
  <text x="570" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14202e">"ما يُسجَّل مباشرة"</text>

  <!-- Explicit items -->
  <rect x="490" y="135" width="160" height="35" rx="8" fill="white" stroke="#bdc3c8"/>
  <text x="560" y="157" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#555">الاسم، العمر، الجنس</text>
  <text x="520" y="158" font-family="Arial, sans-serif" font-size="18">📋</text>

  <rect x="490" y="180" width="160" height="35" rx="8" fill="white" stroke="#bdc3c8"/>
  <text x="560" y="202" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#555">الرمز البريدي، الدخل</text>
  <text x="520" y="203" font-family="Arial, sans-serif" font-size="18">🗄️</text>

  <rect x="490" y="225" width="160" height="35" rx="8" fill="white" stroke="#bdc3c8"/>
  <text x="575" y="247" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#555">النقرات، الأوقات</text>
  <text x="520" y="248" font-family="Arial, sans-serif" font-size="18">📱</text>

  <rect x="490" y="270" width="160" height="35" rx="8" fill="white" stroke="#bdc3c8"/>
  <text x="560" y="292" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#555">المشتريات، المطالبات</text>
  <text x="520" y="293" font-family="Arial, sans-serif" font-size="18">💳</text>

  <!-- Center: Feature Engineering -->
  <circle cx="350" cy="195" r="55" fill="#fff3cd" stroke="#a07c1d" stroke-width="3"/>
  <text x="350" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="40">🔍</text>
  <text x="350" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#856404">هندسة</text>
  <text x="350" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#856404">الخصائص</text>

  <!-- Arrows -->
  <path d="M 460 195 L 415 195" stroke="#2c5a82" stroke-width="3" fill="none" marker-end="url(#arrowBlueAr)"/>
  <path d="M 285 195 L 240 195" stroke="#a07c1d" stroke-width="3" fill="none" marker-end="url(#arrowOrangeAr)"/>
  <defs>
    <marker id="arrowBlueAr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2c5a82" />
    </marker>
    <marker id="arrowOrangeAr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#a07c1d" />
    </marker>
  </defs>

  <!-- Left Box: Implicit Data -->
  <rect x="30" y="55" width="200" height="280" rx="15" fill="#fef3e2" stroke="#a07c1d" stroke-width="2"/>
  <rect x="30" y="55" width="200" height="40" rx="15" fill="url(#orangeGrad2Ar)"/>
  <text x="130" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">بيانات ضمنية</text>
  <text x="130" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14202e">"ما يمكن استنتاجه"</text>

  <!-- Implicit items -->
  <rect x="50" y="135" width="160" height="35" rx="8" fill="white" stroke="#bdc3c8"/>
  <text x="138" y="157" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#555">درجة المخاطر</text>
  <text x="80" y="158" font-family="Arial, sans-serif" font-size="18">🧠</text>

  <rect x="50" y="180" width="160" height="35" rx="8" fill="white" stroke="#bdc3c8"/>
  <text x="127" y="202" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#555">مؤشر كتلة الجسم</text>
  <text x="80" y="203" font-family="Arial, sans-serif" font-size="18">🧮</text>

  <rect x="50" y="225" width="160" height="35" rx="8" fill="white" stroke="#bdc3c8"/>
  <text x="145" y="247" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#555">أنماط الإنفاق</text>
  <text x="80" y="248" font-family="Arial, sans-serif" font-size="18">📊</text>

  <rect x="50" y="270" width="160" height="35" rx="8" fill="#fadbd8" stroke="#b15c26"/>
  <text x="140" y="292" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#922b21">سمات مخفية!</text>
  <text x="80" y="293" font-family="Arial, sans-serif" font-size="18">👁️</text>

  <!-- Bottom Message -->
  <rect x="100" y="350" width="500" height="40" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="350" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#155724">نفس التقنيات التي تساعد الذكاء الاصطناعي يمكن أن تكشف عن الأفراد!</text>
</svg>